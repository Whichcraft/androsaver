name: Android CI/CD

on:
  push:
    branches: [ dev, master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/androsaver.jks

      - name: Build release APK
        env:
          KEYSTORE_PATH: androsaver.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            ./gradlew assembleDevRelease
          else
            ./gradlew assembleProdRelease
          fi

      - name: Rename APK
        run: |
          if [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            mv app/build/outputs/apk/dev/release/*.apk app/build/outputs/apk/dev/release/androsaver.apk
          else
            mv app/build/outputs/apk/prod/release/*.apk app/build/outputs/apk/prod/release/androsaver.apk
          fi

      - name: Write version manifest
        run: |
          VERSION_CODE=$(git rev-list --count HEAD)
          VERSION_PATCH_BASE=124
          VERSION_PATCH=$((VERSION_CODE - VERSION_PATCH_BASE))
          VERSION_NAME="1.3.${VERSION_PATCH}"
          if [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            TAG="dev"
          else
            TAG="stable"
          fi
          APK_URL="https://github.com/Whichcraft/androsaver/releases/download/${TAG}/androsaver.apk"
          printf '{"versionCode":%s,"versionName":"%s","apkUrl":"%s"}\n' \
            "$VERSION_CODE" "$VERSION_NAME" "$APK_URL" > version.json

      - name: Move dev tag to current commit
        if: github.ref == 'refs/heads/dev'
        run: git push origin HEAD:refs/tags/dev --force

      - name: Delete existing dev release
        if: github.ref == 'refs/heads/dev'
        run: gh release delete dev --yes || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish to dev release
        if: github.ref == 'refs/heads/dev'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Dev
          prerelease: true
          files: |
            app/build/outputs/apk/dev/release/androsaver.apk
            version.json

      - name: Move stable tag to current commit
        if: github.ref == 'refs/heads/master'
        run: git push origin HEAD:refs/tags/stable --force

      - name: Publish to stable release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stable
          name: Stable
          prerelease: false
          make_latest: true
          files: |
            app/build/outputs/apk/prod/release/androsaver.apk
            version.json

  bundle-playstore:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout playstore branch
        uses: actions/checkout@v4
        with:
          ref: playstore
          fetch-depth: 0

      - name: Merge master into playstore and push
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git merge origin/master --no-edit
          git push origin playstore

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/androsaver.jks

      - name: Build release AAB
        env:
          KEYSTORE_PATH: androsaver.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleProdRelease

      - name: Rename AAB
        run: mv app/build/outputs/bundle/prodRelease/*.aab app/build/outputs/bundle/prodRelease/androsaver.aab

      - name: Move playstore-stable tag to current commit
        run: git push origin HEAD:refs/tags/playstore-stable --force

      - name: Publish AAB to playstore-stable release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: playstore-stable
          name: Playstore Stable
          prerelease: false
          make_latest: false
          files: app/build/outputs/bundle/prodRelease/androsaver.aab
